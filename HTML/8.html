<!DOCTYPE html>
<html>
<head>

<script>

function savePreference() {

    let event =
        document.getElementById("eventType").value;

    localStorage.setItem("preferredEvent", event);
}

function loadPreference() {

    let saved =
        localStorage.getItem("preferredEvent");

    if(saved) {
        document.getElementById("eventType").value =
            saved;
    }
}

function clearPreferences() {

    localStorage.clear();
    sessionStorage.clear();

    alert("Preferences Cleared");
}

</script>

</head>

<body onload="loadPreference()">

<select id="eventType" onchange="savePreference()">

    <option>Music</option>
    <option>Sports</option>
    <option>Dance</option>

</select>

<br><br>

<button onclick="clearPreferences()">
    Clear Preferences
</button>

</body>
</html>
